<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MercadosApp — Mi panel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8faf8; color: #1a2e1a; }

    /* Nav */
    nav { background: #166534; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    nav .logo { color: white; font-size: 18px; font-weight: 700; }
    nav .info-usuario { color: #bbf7d0; font-size: 13px; }
    nav .info-usuario strong { color: white; }
    .btn-salir { background: rgba(255,255,255,0.15); color: white; border: none; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .btn-salir:hover { background: rgba(255,255,255,0.25); }

    /* Layout */
    .layout { display: flex; min-height: calc(100vh - 52px); }
    .sidebar { width: 220px; background: white; border-right: 1px solid #e5e7eb; padding: 20px 12px; flex-shrink: 0; }
    .sidebar .menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 9px; cursor: pointer; font-size: 14px; color: #4b5563; margin-bottom: 4px; transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
    .sidebar .menu-item:hover { background: #f0fdf4; color: #166534; }
    .sidebar .menu-item.activo { background: #dcfce7; color: #166534; font-weight: 600; }
    .sidebar .icono { font-size: 18px; }
    .main { flex: 1; padding: 28px 24px; max-width: 900px; }

    /* Titulo sección */
    .seccion-titulo { font-size: 22px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 18px; text-align: center; }
    .stat .numero { font-size: 32px; font-weight: 700; color: #166534; }
    .stat .etiqueta { font-size: 12px; color: #9ca3af; margin-top: 4px; }

    /* Botones */
    .btn-verde { background: #166534; color: white; border: none; padding: 10px 20px; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-verde:hover { background: #14532d; }
    .btn-amarillo { background: #ca8a04; color: white; border: none; padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .btn-amarillo:hover { background: #a16207; }
    .btn-rojo { background: #dc2626; color: white; border: none; padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .btn-rojo:hover { background: #b91c1c; }
    .btn-gris { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; }

    /* Tabla */
    .tabla-wrap { background: white; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead { background: #f9fafb; }
    th { text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 12px 16px; border-top: 1px solid #f3f4f6; vertical-align: middle; }
    tr:hover td { background: #f9fafb; }
    .emoji-col { font-size: 24px; }
    .precio-col { font-weight: 700; color: #166534; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-oferta { background: #fef9c3; color: #854d0e; }
    .badge-cat { background: #eff6ff; color: #1d4ed8; }
    .acciones { display: flex; gap: 6px; }

    /* Formulario modal */
    .modal-fondo { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-fondo.abierto { display: flex; }
    .modal { background: white; border-radius: 16px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; padding: 28px; }
    .modal h2 { font-size: 18px; margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    input[type=text], input[type=number], select, textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #d1d5db; border-radius: 9px; font-size: 14px; outline: none; margin-bottom: 14px; font-family: inherit; }
    input:focus, select:focus, textarea:focus { border-color: #166534; }
    .modal-botones { display: flex; gap: 10px; margin-top: 8px; }
    .modal-botones button { flex: 1; }

    /* Notificación */
    .notif { position: fixed; top: 70px; right: 20px; background: #166534; color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 200; transform: translateX(200px); opacity: 0; transition: all 0.3s; }
    .notif.visible { transform: translateX(0); opacity: 1; }
    .notif.error { background: #dc2626; }

    /* Seccion vacia */
    .vacio { text-align: center; padding: 48px; color: #9ca3af; }
    .vacio .icono { font-size: 44px; margin-bottom: 12px; }

    /* Responsive */
    @media (max-width: 640px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; display: flex; overflow-x: auto; gap: 4px; padding: 10px 12px; border-right: none; border-bottom: 1px solid #e5e7eb; }
      .sidebar .menu-item { white-space: nowrap; flex-shrink: 0; }
      .main { padding: 16px; }
    }
  </style>
</head>
<body>

<nav>
  <span class="logo">🛒 MercadosApp</span>
  <span class="info-usuario">Mercado: <strong id="nombre-mercado"></strong></span>
  <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>
</nav>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <button class="menu-item activo" onclick="mostrar('resumen')"><span class="icono">📊</span> Resumen</button>
    <button class="menu-item" onclick="mostrar('productos')"><span class="icono">📦</span> Productos</button>
    <button class="menu-item" onclick="mostrar('ofertas')"><span class="icono">🏷️</span> Ofertas</button>
    <button class="menu-item" onclick="window.open('index.html','_blank')"><span class="icono">👁️</span> Ver mi mercado</button>
  </div>

  <!-- Contenido principal -->
  <div class="main">

    <!-- ── RESUMEN ──────────────────────────────────── -->
    <div id="sec-resumen">
      <div class="seccion-titulo">📊 Resumen</div>
      <div class="stats">
        <div class="stat">
          <div class="numero" id="stat-productos">0</div>
          <div class="etiqueta">Productos activos</div>
        </div>
        <div class="stat">
          <div class="numero" id="stat-ofertas">0</div>
          <div class="etiqueta">Ofertas activas</div>
        </div>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn-verde" onclick="mostrar('productos');abrirFormProducto()">+ Agregar producto</button>
        <button class="btn-amarillo" onclick="mostrar('ofertas');abrirFormOferta()">+ Crear oferta</button>
      </div>
    </div>

    <!-- ── PRODUCTOS ────────────────────────────────── -->
    <div id="sec-productos" style="display:none">
      <div class="seccion-titulo" style="justify-content:space-between;flex-wrap:wrap;gap:10px">
        <span>📦 Mis productos</span>
        <button class="btn-verde" onclick="abrirFormProducto()">+ Agregar producto</button>
      </div>
      <div class="tabla-wrap">
        <table>
          <thead>
            <tr>
              <th></th>
              <th>Producto</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-productos">
            <tr><td colspan="5"><div class="vacio"><div class="icono">📦</div><p>Sin productos todavía</p></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ── OFERTAS ───────────────────────────────────── -->
    <div id="sec-ofertas" style="display:none">
      <div class="seccion-titulo" style="justify-content:space-between;flex-wrap:wrap;gap:10px">
        <span>🏷️ Ofertas y promociones</span>
        <button class="btn-amarillo" onclick="abrirFormOferta()">+ Crear oferta</button>
      </div>
      <div class="tabla-wrap">
        <table>
          <thead>
            <tr><th>Producto</th><th>Precio oferta</th><th>Descripción</th><th>Acciones</th></tr>
          </thead>
          <tbody id="tabla-ofertas">
            <tr><td colspan="4"><div class="vacio"><div class="icono">🏷️</div><p>Sin ofertas activas</p></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- fin main -->
</div><!-- fin layout -->

<!-- ── MODAL PRODUCTO ─────────────────────────────── -->
<div class="modal-fondo" id="modal-producto">
  <div class="modal">
    <h2 id="titulo-modal-producto">Agregar producto</h2>
    <input type="hidden" id="prod-id" />
    <label>Nombre del producto *</label>
    <input type="text" id="prod-nombre" placeholder="Ej: Tomate chonto" />
    <label>Categoría *</label>
    <select id="prod-cat">
      <option value="Frutas">🍎 Frutas</option>
      <option value="Verduras" selected>🥦 Verduras</option>
      <option value="Carnes">🍗 Carnes</option>
      <option value="Lácteos">🥛 Lácteos</option>
      <option value="Granos">🌾 Granos</option>
      <option value="Bebidas">🧃 Bebidas</option>
      <option value="Otros">📦 Otros</option>
    </select>
    <label>Precio *</label>
    <input type="number" id="prod-precio" placeholder="0" min="0" step="0.01" />
    <label>Unidad de medida *</label>
    <select id="prod-unidad">
      <option value="kg">kg (kilogramo)</option>
      <option value="gr">gr (gramo)</option>
      <option value="litro">litro</option>
      <option value="unidad">unidad</option>
      <option value="docena">docena</option>
      <option value="bolsa">bolsa</option>
      <option value="libra">libra</option>
    </select>
    <label>Descripción breve (opcional)</label>
    <textarea id="prod-desc" rows="2" placeholder="Ej: Fresco, de la región"></textarea>
    <div class="modal-botones">
      <button class="btn-gris" onclick="cerrarModal('modal-producto')">Cancelar</button>
      <button class="btn-verde" onclick="guardarProducto()">Guardar producto</button>
    </div>
  </div>
</div>

<!-- ── MODAL OFERTA ───────────────────────────────── -->
<div class="modal-fondo" id="modal-oferta">
  <div class="modal">
    <h2>Crear oferta</h2>
    <input type="hidden" id="oferta-id" />
    <label>Producto *</label>
    <select id="oferta-producto"></select>
    <label>Precio de oferta * (debe ser menor al precio base)</label>
    <input type="number" id="oferta-precio" placeholder="0" min="0" step="0.01" />
    <label>Descripción de la oferta *</label>
    <input type="text" id="oferta-desc" placeholder='Ej: "2x1", "20% descuento"' />
    <div class="modal-botones">
      <button class="btn-gris" onclick="cerrarModal('modal-oferta')">Cancelar</button>
      <button class="btn-amarillo" onclick="guardarOferta()">Crear oferta</button>
    </div>
  </div>
</div>

<!-- Notificación toast -->
<div class="notif" id="notif"></div>

<script>
// ── Sesión ────────────────────────────────────────────────────────
const sesion = JSON.parse(localStorage.getItem('mercadosapp_sesion') || 'null');
if (!sesion) { window.location.href = 'login.html'; }

document.getElementById('nombre-mercado').textContent = sesion.mercadoNombre || 'Mi Mercado';

function cerrarSesion() {
  localStorage.removeItem('mercadosapp_sesion');
  window.location.href = 'login.html';
}

// ── Datos ─────────────────────────────────────────────────────────
function todos()  { return JSON.parse(localStorage.getItem('mercadosapp_productos') || '[]'); }
function guardar(ps) { localStorage.setItem('mercadosapp_productos', JSON.stringify(ps)); }

function misProductos() {
  return todos().filter(p => p.mercadoId === sesion.mercadoId && p.activo !== false);
}

// ── Notificación ──────────────────────────────────────────────────
function notif(msg, error) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = 'notif visible' + (error ? ' error' : '');
  setTimeout(() => el.className = 'notif', 2800);
}

// ── Secciones ─────────────────────────────────────────────────────
function mostrar(sec) {
  ['resumen','productos','ofertas'].forEach(s => {
    document.getElementById('sec-' + s).style.display = s === sec ? 'block' : 'none';
  });
  document.querySelectorAll('.menu-item').forEach((btn, i) => {
    btn.classList.toggle('activo', btn.textContent.toLowerCase().includes(sec) || (sec==='resumen' && i===0));
  });
  if (sec === 'productos') renderTablaProductos();
  if (sec === 'ofertas')   renderTablaOfertas();
  if (sec === 'resumen')   renderResumen();
}

// ── Resumen ───────────────────────────────────────────────────────
function renderResumen() {
  const ps = misProductos();
  const ofertas = ps.filter(p => p.oferta);
  document.getElementById('stat-productos').textContent = ps.length;
  document.getElementById('stat-ofertas').textContent   = ofertas.length;
}

// ── Tabla Productos ───────────────────────────────────────────────
const EMOJIS = { Frutas:'🍎', Verduras:'🥦', Carnes:'🍗', 'Lácteos':'🥛', Granos:'🌾', Bebidas:'🧃', Otros:'📦' };

function renderTablaProductos() {
  const ps = misProductos();
  const tbody = document.getElementById('tabla-productos');
  if (ps.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5"><div class="vacio"><div class="icono">📦</div><p>Aún no tienes productos. ¡Agrega el primero!</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = ps.map(p => {
    return '<tr>' +
      '<td class="emoji-col">' + (EMOJIS[p.categoria] || '📦') + '</td>' +
      '<td><strong>' + p.nombre + '</strong><br><small style="color:#9ca3af">' + p.unidad + '</small></td>' +
      '<td><span class="badge badge-cat">' + p.categoria + '</span></td>' +
      '<td class="precio-col">$' + Number(p.precio).toLocaleString('es-CO') + (p.oferta ? '<br><span class="badge badge-oferta">🏷️ oferta</span>' : '') + '</td>' +
      '<td><div class="acciones">' +
        '<button class="btn-amarillo" onclick="editarProducto(\'' + p.id + '\')">✏️ Editar</button>' +
        '<button class="btn-rojo" onclick="eliminarProducto(\'' + p.id + '\')">🗑️</button>' +
      '</div></td>' +
      '</tr>';
  }).join('');
}

// ── Tabla Ofertas ─────────────────────────────────────────────────
function renderTablaOfertas() {
  const ps = misProductos().filter(p => p.oferta);
  const tbody = document.getElementById('tabla-ofertas');
  if (ps.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4"><div class="vacio"><div class="icono">🏷️</div><p>Sin ofertas activas</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = ps.map(p =>
    '<tr>' +
    '<td><strong>' + p.nombre + '</strong></td>' +
    '<td class="precio-col">$' + Number(p.precio).toLocaleString('es-CO') + ' / ' + p.unidad + '</td>' +
    '<td>' + (p.oferta || '—') + '</td>' +
    '<td><button class="btn-rojo" onclick="quitarOferta(\'' + p.id + '\')">✖ Cancelar</button></td>' +
    '</tr>'
  ).join('');
}

// ── CRUD Productos ────────────────────────────────────────────────
function abrirFormProducto(id) {
  document.getElementById('prod-id').value = id || '';
  if (id) {
    const p = todos().find(x => x.id === id);
    document.getElementById('titulo-modal-producto').textContent = 'Editar producto';
    document.getElementById('prod-nombre').value  = p.nombre;
    document.getElementById('prod-cat').value     = p.categoria;
    document.getElementById('prod-precio').value  = p.precioBase || p.precio;
    document.getElementById('prod-unidad').value  = p.unidad;
    document.getElementById('prod-desc').value    = p.descripcion || '';
  } else {
    document.getElementById('titulo-modal-producto').textContent = 'Agregar producto';
    document.getElementById('prod-nombre').value  = '';
    document.getElementById('prod-precio').value  = '';
    document.getElementById('prod-desc').value    = '';
  }
  document.getElementById('modal-producto').classList.add('abierto');
}

function editarProducto(id) { abrirFormProducto(id); }

function guardarProducto() {
  const nombre  = document.getElementById('prod-nombre').value.trim();
  const cat     = document.getElementById('prod-cat').value;
  const precio  = parseFloat(document.getElementById('prod-precio').value);
  const unidad  = document.getElementById('prod-unidad').value;
  const desc    = document.getElementById('prod-desc').value.trim();
  const id      = document.getElementById('prod-id').value;

  if (!nombre || !precio || precio <= 0) { notif('Completa nombre y precio correctamente', true); return; }

  let ps = todos();
  if (id) {
    // Editar
    ps = ps.map(p => p.id === id ? { ...p, nombre, categoria: cat, precio, precioBase: precio, unidad, descripcion: desc, fecha: new Date().toISOString() } : p);
    notif('✅ Producto actualizado');
  } else {
    // Nuevo
    ps.push({ id: 'prod_' + Date.now(), nombre, categoria: cat, precio, precioBase: precio, unidad, descripcion: desc, mercadoId: sesion.mercadoId, oferta: null, emoji: EMOJIS[cat] || '📦', fecha: new Date().toISOString(), activo: true });
    notif('✅ Producto agregado');
  }
  guardar(ps);
  cerrarModal('modal-producto');
  renderTablaProductos();
  renderResumen();
}

function eliminarProducto(id) {
  if (!confirm('¿Eliminar este producto de tu catálogo?')) return;
  const ps = todos().map(p => p.id === id ? { ...p, activo: false } : p);
  guardar(ps);
  notif('🗑️ Producto eliminado');
  renderTablaProductos();
  renderResumen();
}

// ── CRUD Ofertas ──────────────────────────────────────────────────
function abrirFormOferta() {
  const select = document.getElementById('oferta-producto');
  select.innerHTML = '';
  misProductos().forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.nombre + ' (precio base: $' + Number(p.precioBase || p.precio).toLocaleString('es-CO') + ')';
    select.appendChild(opt);
  });
  if (misProductos().length === 0) { notif('Primero agrega productos', true); return; }
  document.getElementById('oferta-precio').value = '';
  document.getElementById('oferta-desc').value   = '';
  document.getElementById('modal-oferta').classList.add('abierto');
}

function guardarOferta() {
  const prodId      = document.getElementById('oferta-producto').value;
  const precioOferta = parseFloat(document.getElementById('oferta-precio').value);
  const desc        = document.getElementById('oferta-desc').value.trim();

  if (!precioOferta || precioOferta <= 0 || !desc) { notif('Completa todos los campos', true); return; }

  let ps = todos();
  const prod = ps.find(p => p.id === prodId);
  const precioBase = prod.precioBase || prod.precio;

  if (precioOferta >= precioBase) { notif('El precio de oferta debe ser menor al precio base ($' + Number(precioBase).toLocaleString('es-CO') + ')', true); return; }

  ps = ps.map(p => p.id === prodId ? { ...p, precio: precioOferta, oferta: desc, fecha: new Date().toISOString() } : p);
  guardar(ps);
  notif('🏷️ Oferta creada');
  cerrarModal('modal-oferta');
  renderTablaOfertas();
  renderResumen();
}

function quitarOferta(id) {
  if (!confirm('¿Cancelar esta oferta? El producto volverá a su precio base.')) return;
  let ps = todos();
  ps = ps.map(p => p.id === id ? { ...p, precio: p.precioBase || p.precio, oferta: null } : p);
  guardar(ps);
  notif('✅ Oferta cancelada');
  renderTablaOfertas();
  renderResumen();
}

// ── Modales ───────────────────────────────────────────────────────
function cerrarModal(id) {
  document.getElementById(id).classList.remove('abierto');
}

// Cerrar al hacer clic fuera del modal
document.querySelectorAll('.modal-fondo').forEach(fondo => {
  fondo.addEventListener('click', function(e) {
    if (e.target === fondo) fondo.classList.remove('abierto');
  });
});

// ── Inicio ────────────────────────────────────────────────────────
renderResumen();
</script>
</body>
</html>
