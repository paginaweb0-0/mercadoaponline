<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MercadosApp — Ingresar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0fdf4; min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: #166534; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    nav .logo { color: white; font-size: 20px; font-weight: 700; text-decoration: none; }
    nav a.volver { color: #bbf7d0; font-size: 14px; text-decoration: none; }
    .centro { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .caja { background: white; border-radius: 16px; border: 1px solid #d1fae5; padding: 40px 32px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .icono-top { font-size: 40px; text-align: center; margin-bottom: 8px; }
    h1 { font-size: 22px; text-align: center; color: #166534; margin-bottom: 6px; }
    .subtitulo { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    input[type=text], input[type=email], input[type=password] { width: 100%; padding: 11px 14px; border: 1.5px solid #d1d5db; border-radius: 9px; font-size: 14px; outline: none; transition: border-color 0.2s; margin-bottom: 16px; }
    input:focus { border-color: #166534; }
    .btn-verde { width: 100%; background: #166534; color: white; border: none; padding: 13px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: background 0.2s; }
    .btn-verde:hover { background: #14532d; }
    .separador { text-align: center; color: #9ca3af; font-size: 13px; margin: 18px 0; position: relative; }
    .separador::before, .separador::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: #e5e7eb; }
    .separador::before { left: 0; } .separador::after { right: 0; }
    .btn-gris { width: 100%; background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; padding: 11px; border-radius: 10px; font-size: 14px; cursor: pointer; }
    .btn-gris:hover { background: #e5e7eb; }
    .pie { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
    .pie a { color: #166534; text-decoration: none; font-weight: 600; }
    .alerta { padding: 12px 14px; border-radius: 9px; font-size: 13px; margin-bottom: 16px; display: none; }
    .alerta.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
    .alerta.exito   { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; display: block; }
    .tabs { display: flex; border-bottom: 2px solid #e5e7eb; margin-bottom: 24px; }
    .tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; font-weight: 600; color: #9ca3af; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab.activo { color: #166534; border-bottom-color: #166534; }
    .panel { display: none; } .panel.activo { display: block; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">🛒 MercadosApp</a>
  <a href="index.html" class="volver">← Ver precios</a>
</nav>
<div class="centro">
  <div class="caja">
    <div class="icono-top">🏪</div>
    <h1>Panel de mercaderes</h1>
    <p class="subtitulo">Gestiona los productos de tu mercado</p>
    <div class="tabs">
      <div class="tab activo" onclick="cambiarTab('login')">Ingresar</div>
      <div class="tab" onclick="cambiarTab('registro')">Registrarse</div>
    </div>
    <div class="alerta" id="alerta"></div>
    <div class="panel activo" id="panel-login">
      <label>Correo electrónico</label>
      <input type="email" id="email-login" placeholder="tu@correo.com" />
      <label>Contraseña</label>
      <input type="password" id="pass-login" placeholder="Tu contraseña" />
      <button class="btn-verde" onclick="iniciarSesion()">Ingresar al panel</button>
      <div class="separador">o</div>
      <button class="btn-gris" onclick="entrarDemo()">🚀 Entrar con cuenta de demostración</button>
      <p class="pie"><a href="#" onclick="recuperar()">¿Olvidaste tu contraseña?</a></p>
    </div>
    <div class="panel" id="panel-registro">
      <label>Tu nombre completo</label>
      <input type="text" id="reg-nombre" placeholder="Ej: Carlos Pérez" />
      <label>Nombre de tu mercado</label>
      <input type="text" id="reg-mercado" placeholder="Ej: Mercado La Esperanza" />
      <label>Correo electrónico</label>
      <input type="email" id="reg-email" placeholder="tu@correo.com" />
      <label>Contraseña (mínimo 6 caracteres)</label>
      <input type="password" id="reg-pass" placeholder="Elige una contraseña" />
      <label>Dirección del mercado</label>
      <input type="text" id="reg-dir" placeholder="Ej: Calle 10 # 5-23" />
      <button class="btn-verde" onclick="registrarse()">Crear cuenta gratis</button>
    </div>
  </div>
</div>
<script>
function cambiarTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('activo', (i===0&&tab==='login')||(i===1&&tab==='registro')));
  document.getElementById('panel-login').classList.toggle('activo', tab==='login');
  document.getElementById('panel-registro').classList.toggle('activo', tab==='registro');
  document.getElementById('alerta').className = 'alerta';
}
function alerta(msg, tipo) {
  const el = document.getElementById('alerta');
  el.textContent = msg;
  el.className = 'alerta ' + tipo;
}
function usuarios() { return JSON.parse(localStorage.getItem('mercadosapp_usuarios') || '[]'); }
function guardarUsuarios(u) { localStorage.setItem('mercadosapp_usuarios', JSON.stringify(u)); }

function entrarDemo() {
  const us = usuarios();
  if (!us.find(u => u.email === 'demo@mercado.com')) {
    us.push({ id: 'm1', nombre: 'Carlos Demo', email: 'demo@mercado.com', password: 'demo123', mercadoId: 'm1', mercadoNombre: 'Mercado Central' });
    guardarUsuarios(us);
  }
  localStorage.setItem('mercadosapp_sesion', JSON.stringify({ id: 'm1', nombre: 'Carlos Demo', mercadoId: 'm1', mercadoNombre: 'Mercado Central' }));
  window.location.href = 'panel.html';
}

function iniciarSesion() {
  const email = document.getElementById('email-login').value.trim();
  const pass  = document.getElementById('pass-login').value;
  if (!email || !pass) { alerta('Completa todos los campos', 'error'); return; }
  const u = usuarios().find(u => u.email === email && u.password === pass);
  if (!u) { alerta('Correo o contraseña incorrectos', 'error'); return; }
  localStorage.setItem('mercadosapp_sesion', JSON.stringify(u));
  window.location.href = 'panel.html';
}

function registrarse() {
  const nombre  = document.getElementById('reg-nombre').value.trim();
  const mercado = document.getElementById('reg-mercado').value.trim();
  const email   = document.getElementById('reg-email').value.trim();
  const pass    = document.getElementById('reg-pass').value;
  const dir     = document.getElementById('reg-dir').value.trim();
  if (!nombre || !mercado || !email || !pass || !dir) { alerta('Completa todos los campos', 'error'); return; }
  if (pass.length < 6) { alerta('La contraseña necesita al menos 6 caracteres', 'error'); return; }
  const us = usuarios();
  if (us.find(u => u.email === email)) { alerta('Ese correo ya está registrado', 'error'); return; }
  const mercados = JSON.parse(localStorage.getItem('mercadosapp_mercados') || '[]');
  if (mercados.find(m => m.nombre.toLowerCase() === mercado.toLowerCase())) { alerta('Ya existe un mercado con ese nombre', 'error'); return; }
  const mercadoId = 'm_' + Date.now();
  const id = 'u_' + Date.now();
  mercados.push({ id: mercadoId, nombre: mercado, direccion: dir });
  localStorage.setItem('mercadosapp_mercados', JSON.stringify(mercados));
  us.push({ id, nombre, email, password: pass, mercadoId, mercadoNombre: mercado });
  guardarUsuarios(us);
  localStorage.setItem('mercadosapp_sesion', JSON.stringify({ id, nombre, mercadoId, mercadoNombre: mercado }));
  alerta('¡Cuenta creada! Redirigiendo...', 'exito');
  setTimeout(() => window.location.href = 'panel.html', 1000);
}

function recuperar() {
  const email = prompt('Escribe tu correo:');
  if (!email) return;
  const u = usuarios().find(u => u.email === email.trim());
  if (u) alert('Tu contraseña es: ' + u.password + '\n(En una app real, esto llegaría por correo)');
  else alert('No encontramos ninguna cuenta con ese correo.');
}

document.addEventListener('keypress', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('panel-login').classList.contains('activo')) iniciarSesion();
  else registrarse();
});
</script>
</body>
</html>
