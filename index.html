<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MercadosApp — Consulta precios</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8faf8; color: #1a2e1a; min-height: 100vh; }

    nav { background: #166534; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    nav .logo { color: white; font-size: 20px; font-weight: 700; text-decoration: none; }
    nav .nav-links a { color: #bbf7d0; text-decoration: none; margin-left: 16px; font-size: 14px; }
    nav .nav-links a:hover { color: white; }

    .hero { background: linear-gradient(135deg, #15803d, #166534); padding: 60px 24px; text-align: center; color: white; }
    .hero h1 { font-size: 32px; margin-bottom: 10px; }
    .hero p  { font-size: 16px; color: #bbf7d0; margin-bottom: 28px; }

    .search-bar { display: flex; gap: 8px; max-width: 560px; margin: 0 auto; }
    .search-bar input { flex: 1; padding: 12px 16px; border-radius: 10px; border: none; font-size: 15px; outline: none; }
    .search-bar button { background: #ca8a04; color: white; border: none; padding: 12px 24px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .search-bar button:hover { background: #a16207; }

    .filtros { background: white; border-bottom: 1px solid #e5e7eb; padding: 14px 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .filtros label { font-size: 13px; color: #6b7280; font-weight: 500; }
    .filtros select { padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; background: white; cursor: pointer; }

    .contenido { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }
    .resultados-info { font-size: 14px; color: #6b7280; margin-bottom: 16px; }
    .resultados-info strong { color: #166534; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }

    .tarjeta { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 16px; transition: box-shadow 0.2s; }
    .tarjeta:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .tarjeta-imagen { width: 100%; height: 120px; background: #f0fdf4; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 12px; overflow: hidden; }
    .tarjeta-imagen img { width: 100%; height: 100%; object-fit: cover; }
    .tarjeta h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }

    .precio { font-size: 22px; font-weight: 700; color: #166534; margin: 8px 0 4px; }
    .precio span { font-size: 12px; color: #9ca3af; font-weight: 400; }

    .mercado-link { font-size: 12px; color: #166534; font-weight: 500; }
    .fecha { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .badge-oferta { display: inline-block; background: #fef9c3; color: #854d0e; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; }

    .vacio { text-align: center; padding: 60px 20px; color: #9ca3af; }
    .vacio .icono { font-size: 48px; margin-bottom: 12px; }

    footer { background: #1a2e1a; color: #9ca3af; text-align: center; padding: 24px; margin-top: 60px; font-size: 13px; }
    footer strong { color: white; }

    @media (max-width: 500px) {
      .hero h1 { font-size: 24px; }
      .search-bar { flex-direction: column; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">🛒 MercadosApp Abra Pampa</a>
  <div class="nav-links">
    <a href="index.html">Buscar precios</a>
    <a href="login.html">Soy mercader →</a>
  </div>
</nav>

<div class="hero">
  <h1>Compara precios de tu mercado</h1>
  <p>Consulta precios actualizados sin registrarte</p>
  <div class="search-bar">
    <input type="text" id="busqueda" placeholder="¿Qué buscas? Ej: tomate, pollo, leche…" />
    <button onclick="buscar()">Buscar</button>
  </div>
</div>

<div class="filtros">
  <label>Mercado:</label>
  <select id="filtroMercado" onchange="buscar()">
    <option value="">Todos</option>
  </select>

  <label>Categoría:</label>
  <select id="filtroCategoria" onchange="buscar()">
    <option value="">Todas</option>
    <option>Frutas</option><option>Verduras</option><option>Carnes</option>
    <option>Lácteos</option><option>Granos</option><option>Bebidas</option><option>Otros</option>
  </select>

  <label>Ordenar:</label>
  <select id="orden" onchange="buscar()">
    <option value="precio_asc">Precio: menor a mayor</option>
    <option value="precio_desc">Precio: mayor a menor</option>
    <option value="reciente">Más recientes</option>
  </select>
</div>

<div class="contenido">
  <div class="resultados-info" id="info"></div>
  <div class="grid" id="resultados"></div>
</div>

<footer><strong>MercadosApp</strong> — Precios claros para todos</footer>

<script>
// ── Datos de ejemplo ──────────────────────────────────────────────
function inicializarDatos() {
  if (localStorage.getItem('mercadosapp_init')) return;

  const mercados = [
    { id: 'm1', nombre: 'Mercado Central', direccion: 'Calle 10 # 5-23' },
    { id: 'm2', nombre: 'La Placita Verde', direccion: 'Av. 15 # 8-40' },
  ];

  const productos = [
    { id: 'p1', nombre: 'Tomate chonto',   categoria: 'Verduras', unidad: 'kg',     precio: 2800,  mercadoId: 'm1', oferta: null,            emoji: '🍅', fecha: new Date().toISOString() },
    { id: 'p2', nombre: 'Papa criolla',    categoria: 'Verduras', unidad: 'kg',     precio: 1900,  mercadoId: 'm1', oferta: '20% descuento',  emoji: '🥔', fecha: new Date().toISOString() },
    { id: 'p3', nombre: 'Pechuga pollo',   categoria: 'Carnes',   unidad: 'kg',     precio: 12000, mercadoId: 'm2', oferta: null,            emoji: '🍗', fecha: new Date().toISOString() },
    { id: 'p4', nombre: 'Manzana roja',    categoria: 'Frutas',   unidad: 'kg',     precio: 5000,  mercadoId: 'm1', oferta: null,            emoji: '🍎', fecha: new Date().toISOString() },
    { id: 'p5', nombre: 'Leche entera',    categoria: 'Lácteos',  unidad: 'litro',  precio: 2200,  mercadoId: 'm2', oferta: '2x1',           emoji: '🥛', fecha: new Date().toISOString() },
    { id: 'p6', nombre: 'Arroz blanco',    categoria: 'Granos',   unidad: 'kg',     precio: 3200,  mercadoId: 'm1', oferta: null,            emoji: '🌾', fecha: new Date().toISOString() },
    { id: 'p7', nombre: 'Huevos AA',       categoria: 'Lácteos',  unidad: 'docena', precio: 13000, mercadoId: 'm2', oferta: null,            emoji: '🥚', fecha: new Date().toISOString() },
    { id: 'p8', nombre: 'Aguacate Hass',   categoria: 'Frutas',   unidad: 'unidad', precio: 1500,  mercadoId: 'm1', oferta: null,            emoji: '🥑', fecha: new Date().toISOString() },
  ];

  localStorage.setItem('mercadosapp_mercados', JSON.stringify(mercados));
  localStorage.setItem('mercadosapp_productos', JSON.stringify(productos));
  localStorage.setItem('mercadosapp_init', '1');
}

function obtenerProductos() {
  return JSON.parse(localStorage.getItem('mercadosapp_productos') || '[]');
}
function obtenerMercados() {
  return JSON.parse(localStorage.getItem('mercadosapp_mercados') || '[]');
}

function cargarMercados() {
  const mercados = obtenerMercados();
  const select = document.getElementById('filtroMercado');
  mercados.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = m.nombre;
    select.appendChild(opt);
  });
}

function tiempoRelativo(fecha) {
  const seg = Math.floor((new Date() - new Date(fecha)) / 1000);
  if (seg < 60)    return 'hace unos segundos';
  if (seg < 3600)  return 'hace ' + Math.floor(seg/60) + ' min';
  if (seg < 86400) return 'hace ' + Math.floor(seg/3600) + ' h';
  return 'hace ' + Math.floor(seg/86400) + ' días';
}

function buscar() {
  const texto     = document.getElementById('busqueda').value.toLowerCase().trim();
  const mercadoId = document.getElementById('filtroMercado').value;
  const categoria = document.getElementById('filtroCategoria').value;
  const orden     = document.getElementById('orden').value;

  let productos = obtenerProductos().filter(p => p.activo !== false);

  if (texto)     productos = productos.filter(p => p.nombre.toLowerCase().includes(texto));
  if (mercadoId) productos = productos.filter(p => p.mercadoId === mercadoId);
  if (categoria) productos = productos.filter(p => p.categoria === categoria);

  if (orden === 'precio_asc')  productos.sort((a,b) => a.precio - b.precio);
  if (orden === 'precio_desc') productos.sort((a,b) => b.precio - a.precio);
  if (orden === 'reciente')    productos.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

  document.getElementById('info').innerHTML = productos.length === 0 ? '' :
    'Se encontraron <strong>' + productos.length + '</strong> producto' + (productos.length !== 1 ? 's' : '') +
    (texto ? ' para "<strong>' + texto + '</strong>"' : '');

  const contenedor = document.getElementById('resultados');
  if (productos.length === 0) {
    contenedor.innerHTML = '<div class="vacio" style="grid-column:1/-1"><div class="icono">🔍</div><p>No se encontraron productos</p><p style="font-size:13px;margin-top:6px">Intenta con otra palabra o quita los filtros</p></div>';
    return;
  }

  const mercados = obtenerMercados();
  contenedor.innerHTML = productos.map(p => {
    const m = mercados.find(x => x.id === p.mercadoId) || { nombre: 'Mercado' };
    const imagen = p.imagenUrl
      ? '<img src="' + p.imagenUrl + '" alt="' + p.nombre + '">'
      : '<span style="font-size:42px">' + (p.emoji || '📦') + '</span>';
    return '<div class="tarjeta">' +
      '<div class="tarjeta-imagen">' + imagen + '</div>' +
      (p.oferta ? '<div class="badge-oferta">🏷️ ' + p.oferta + '</div>' : '') +
      '<h3>' + p.nombre + '</h3>' +
      '<div class="precio">$' + Number(p.precio).toLocaleString('es-CO') + '<span> / ' + p.unidad + '</span></div>' +
      '<div class="mercado-link">📍 ' + m.nombre + '</div>' +
      '<div class="fecha">Actualizado ' + tiempoRelativo(p.fecha) + '</div>' +
      '</div>';
  }).join('');
}

document.getElementById('busqueda').addEventListener('keypress', e => { if (e.key === 'Enter') buscar(); });

inicializarDatos();
cargarMercados();
buscar();
</script>
</body>
</html>
